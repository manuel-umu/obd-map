name: Publicar release
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Tipo de subida de versión"
        required: true
        default: menor
        type: choice
        options:
          - menor
          - mayor
      descripcion:
        description: "Descripción"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Preparar Gradle para el runner
        run: |
          sed -i '/org.gradle.java.home/d' gradle.properties
          chmod +x gradlew

      - name: Calcular la nueva versión
        id: v
        run: |
          CODE=$(grep -oP 'versionCode\s+\K[0-9]+' app/build.gradle | head -1)
          NAME=$(grep -oP 'versionName\s+"\K[^"]+' app/build.gradle | head -1)
          NEW_CODE=$((CODE + 1))
          MAJOR=$(echo "$NAME" | cut -d. -f1)
          MINOR=$(echo "$NAME" | cut -d. -f2)
          PATCH=$(echo "$NAME" | cut -d. -f3); PATCH=${PATCH:-0}
          if [ "${{ inputs.bump }}" = "mayor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          NEW_NAME="${MAJOR}.${MINOR}.${PATCH}"
          echo "code=$NEW_CODE" >> "$GITHUB_OUTPUT"
          echo "name=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "Versión: $NAME (code $CODE)  ->  $NEW_NAME (code $NEW_CODE)"

      - name: Aplicar la versión en build.gradle
        run: |
          sed -i -E "s/versionCode +[0-9]+/versionCode ${{ steps.v.outputs.code }}/" app/build.gradle
          sed -i -E "s/versionName +\"[^\"]+\"/versionName \"${{ steps.v.outputs.name }}\"/" app/build.gradle

      - name: Restaurar el keystore desde los secrets
        env:
          KS: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          SP: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KA: ${{ secrets.RELEASE_KEY_ALIAS }}
          KP: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "$KS" | base64 -d > obdmap-release.jks
          printf 'storeFile=obdmap-release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$SP" "$KA" "$KP" > keystore.properties

      - name: Compilar el APK firmado
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Commit del bump de versión
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle
          git commit -m "Release ${{ steps.v.outputs.name }} (versionCode ${{ steps.v.outputs.code }})"
          git push

      - name: Crear la GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          DESCRIPCION: ${{ inputs.descripcion }}
        run: |
          cp app/build/outputs/apk/release/app-release.apk "obdmap-${{ steps.v.outputs.name }}.apk"
          # Notas: la descripción escrita por el usuario, o un texto automático si se dejó vacía.
          if [ -n "$DESCRIPCION" ]; then
            printf '%s\n' "$DESCRIPCION" > release-notes.md
          else
            printf 'Release automática %s (versionCode %s).\n' \
              "${{ steps.v.outputs.name }}" "${{ steps.v.outputs.code }}" > release-notes.md
          fi
          gh release create "${{ steps.v.outputs.code }}" \
            "obdmap-${{ steps.v.outputs.name }}.apk" \
            --title "${{ steps.v.outputs.name }}" \
            --latest \
            --notes-file release-notes.md

      - name: Limpiar el keystore del runner
        if: always()
        run: rm -f obdmap-release.jks keystore.properties
